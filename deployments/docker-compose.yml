name: temtem

networks:
  koer-network:
    external: true

services:
  migrate:
    image: migrate/migrate:v4.18.1
    profiles: ["tools"]
    networks:
      - koer-network
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${TEMTEM_POSTGRES__USER:-temtem}:${TEMTEM_POSTGRES__PASSWORD:-temtem}@postgres:${TEMTEM_POSTGRES__PORT:-5432}/${TEMTEM_POSTGRES__DATABASE:-temtem}?sslmode=${TEMTEM_POSTGRES__SSL_MODE:-disable}
      - up

  app:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    networks:
      - koer-network
    environment:
      TEMTEM_POSTGRES__HOST: postgres
      TEMTEM_REDIS__ADDR: redis:6379
    ports:
      - "9090:9090"
      - "8080:8080"
      - "9100:9100"
