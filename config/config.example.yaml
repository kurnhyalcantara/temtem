# Local development configuration. Production values come from environment
# variables (see .env.example for the naming convention).
app:
  name: temtem
  env: development
  version: dev

server:
  grpc_port: 9090
  http_port: 8080
  metrics_port: 9100
  shutdown_timeout: 15s

postgres:
  host: localhost
  port: 5432
  user: temtem
  password: temtem
  database: temtem
  ssl_mode: disable
  max_conns: 10
  min_conns: 2
  max_conn_lifetime: 1h

redis:
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  secret: local-development-secret-change-me
  issuer: temtem
  access_ttl: 15m
  refresh_ttl: 720h

log:
  level: debug
  format: text

# scaffold:telemetry:start
telemetry:
  enabled: false
  otlp_endpoint: localhost:4317
  sample_ratio: 1.0
# scaffold:telemetry:end
