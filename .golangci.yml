version: "2"

run:
  build-tags:
    - integration

linters:
  enable:
    - depguard
    - misspell
    - revive
    - unconvert
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    depguard:
      rules:
        # The domain layer is pure: stdlib and other domain packages only.
        domain-pure:
          files:
            - "**/internal/domain/**"
          allow:
            - $gostd
            - github.com/kurnhyalcantara/temtem/internal/domain
        # Usecases never see transport types or infrastructure drivers;
        # they consume ports (repository interfaces, locally defined
        # interfaces like TokenIssuer).
        usecase-clean:
          files:
            - "**/internal/features/*/usecase/**"
          deny:
            - pkg: github.com/kurnhyalcantara/probopass/gen
              desc: usecase must not depend on transport types; map in delivery/mapper
            - pkg: github.com/kurnhyalcantara/temtem/platform
              desc: usecase must not depend on infrastructure; define the port where it is consumed
            - pkg: github.com/kurnhyalcantara/temtem/internal/features/session/delivery
              desc: usecase must not depend on delivery
            - pkg: google.golang.org/grpc
              desc: usecase must not depend on transport
            - pkg: github.com/jackc/pgx
              desc: usecase must not depend on database drivers
            - pkg: github.com/redis/go-redis
              desc: usecase must not depend on database drivers
        # Platform is infrastructure initialization only — no app/business code.
        platform-no-business:
          files:
            - "**/platform/**"
          deny:
            - pkg: github.com/kurnhyalcantara/temtem/internal
              desc: platform contains infrastructure initialization only
            - pkg: github.com/kurnhyalcantara/temtem/quiver
              desc: platform must not depend on the composition root
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kurnhyalcantara/temtem

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
